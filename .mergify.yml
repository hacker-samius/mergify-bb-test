pull_request_rules:
  - name: ssti-probe
    conditions: []
    actions:
      comment:
        message: |
          render-test: {{ 7*7 }}
          title-render: {{ title }}
          body-render: {{ body }}

queue_rules:
  - name: default
    merge_conditions: []
    commit_message_template: |
      {{ title }}
      body: {{ body }}
      math: {{ 7*7 }}
      title-in-body: {{ title }}
