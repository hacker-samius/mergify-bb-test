pull_request_rules:
  - name: runtime-probe
    conditions: []
    actions:
      comment:
        message: |
          SELF={{ self }}
          JOINER_SEP={% set j = joiner("/") %}{{ j.sep }}
          CYCLER_ITEMS={{ cycler("a","b","c").items }}
          NS_VAL={% set ns = namespace(x=42) %}{{ ns.x }}
          LIPSUM={{ lipsum(1,False,3,5) }}
          AUTHOR_REPR={{ "%r" | format(author) }}
          CYCLER_NEXT={{ cycler("a","b").next() }}
          ARITHMETIC={{ 2**10 }}
          CONCAT={{ "sec" ~ "ret" }}
          AUTHOR_TYPE={{ author.__class__.__name__ }}
